<!DOCTYPE html>
<html>
<head>
  <title>Form Builder</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; }
    .field-row { display: flex; gap: 10px; align-items: center; padding: 10px; margin: 6px 0; border: 1px solid #ccc; border-radius: 6px; background: #f9f9f9; }
    .field-row input, .field-row select { padding: 6px; flex: 1; }
    button { padding: 8px 16px; margin: 4px; cursor: pointer; }
    #save-btn { background: #007bff; color: white; border: none; border-radius: 4px; }
    #add-btn { background: #28a745; color: white; border: none; border-radius: 4px; }
    .error { color: red; }
    .success { color: green; }
  </style>
</head>
<body>
  <h2>Form Builder</h2>
  <p id="message"></p>

  <label>Form Name:</label><br>
  <input type="text" id="form-name" placeholder="e.g. HR Onboarding Form" style="width:100%; padding:8px; margin:8px 0">
  <br><br>

  <div id="fields-container"></div>
  <br>

  <button id="add-btn" onclick="addField()">+ Add Field</button>
  <button id="save-btn" onclick="saveForm()">Save</button>
  <br><br>
  <a href="{% url 'form_list' %}">← Back to Forms</a>

  <script>
    const EDIT_FORM_ID = {{ form.id|default:"null" }};

    window.onload = function () {
      if (!EDIT_FORM_ID) return;
      document.getElementById('form-name').value = "{{ form.name|default:'' }}";
      fetch(`/api/forms/${EDIT_FORM_ID}/`, { credentials: 'include' })
        .then(r => r.json())
        .then(data => data.fields.forEach(f => addField(f.label, f.field_type)));
    };

    function addField(label = '', fieldType = 'text') {
      const row = document.createElement('div');
      row.className = 'field-row';
      row.innerHTML = `
        <input type="text" placeholder="Label" value="${label}">
        <select>
          <option value="text" ${fieldType==='text'?'selected':''}>Text</option>
          <option value="number" ${fieldType==='number'?'selected':''}>Number</option>
          <option value="date" ${fieldType==='date'?'selected':''}>Date</option>
          <option value="password" ${fieldType==='password'?'selected':''}>Password</option>
          <option value="email" ${fieldType==='email'?'selected':''}>Email</option>
          <option value="textarea" ${fieldType==='textarea'?'selected':''}>Textarea</option>
        </select>
        <button onclick="this.parentElement.remove()" style="background:red;color:white;border:none;border-radius:4px">✕</button>
      `;
      document.getElementById('fields-container').appendChild(row);
    }

    function saveForm() {
      const name = document.getElementById('form-name').value.trim();
      const rows = document.querySelectorAll('.field-row');
      const msg = document.getElementById('message');

      if (!name) { msg.className='error'; msg.textContent='Form name is required.'; return; }
      if (!rows.length) { msg.className='error'; msg.textContent='Add at least one field.'; return; }

      const fields = [...rows].map((row, i) => ({
        label: row.querySelector('input').value.trim(),
        field_type: row.querySelector('select').value,
        order: i
      })).filter(f => f.label);

      fetch(EDIT_FORM_ID ? `/api/forms/${EDIT_FORM_ID}/` : '/api/forms/', {
        method: EDIT_FORM_ID ? 'PUT' : 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
        credentials: 'include',
        body: JSON.stringify({ name, fields })
      })
      .then(r => r.json())
      .then(data => {
        if (data.id) {
          msg.className = 'success';
          msg.textContent = 'Form saved!';
          setTimeout(() => window.location.href = "{% url 'form_list' %}", 1000);
        } else {
          msg.className = 'error';
          msg.textContent = JSON.stringify(data);
        }
      });
    }

    function getCookie(name) {
      let val = null;
      document.cookie.split(';').forEach(c => {
        c = c.trim();
        if (c.startsWith(name + '=')) val = decodeURIComponent(c.slice(name.length + 1));
      });
      return val;
    }
  </script>
</body>
</html>
