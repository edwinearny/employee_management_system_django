<!DOCTYPE html>
<html>
<head>
  <title>{% if employee %}Edit{% else %}Create{% endif %} Employee</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    .field-group { margin-bottom: 16px; }
    label { display: block; margin-bottom: 4px; font-weight: bold; }
    input, textarea { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 8px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    .error { color: red; }
    .success { color: green; }
  </style>
</head>
<body>
  <h2>{% if employee %}Edit{% else %}Create{% endif %} Employee</h2>
  <p id="message"></p>

  <div id="fields-container">
    {% for field in employee_form.fields.all %}
    <div class="field-group">
      <label>{{ field.label }}</label>
      {% if field.field_type == 'textarea' %}
        <textarea name="field_{{ field.id }}" data-field-id="{{ field.id }}">{% if employee %}{% for fv in employee.field_values.all %}{% if fv.field.id == field.id %}{{ fv.value }}{% endif %}{% endfor %}{% endif %}</textarea>
      {% else %}
        <input type="{{ field.field_type }}"
               name="field_{{ field.id }}"
               data-field-id="{{ field.id }}"
               value="{% if employee %}{% for fv in employee.field_values.all %}{% if fv.field.id == field.id %}{{ fv.value }}{% endif %}{% endfor %}{% endif %}">
      {% endif %}
    </div>
    {% endfor %}
  </div>

  <br>
  <button onclick="saveEmployee()">
    {% if employee %}Update{% else %}Create{% endif %}
  </button>
  <a href="{% url 'employee_list' %}" style="margin-left:10px">← Back</a>

  <script>
    const FORM_ID = {{ employee_form.id }};
    const EMPLOYEE_ID = {{ employee.id|default:"null" }};

    function saveEmployee() {
      const inputs = document.querySelectorAll('[data-field-id]');
      const field_values = [];
      const msg = document.getElementById('message');

      inputs.forEach(input => {
        field_values.push({
          field: input.dataset.fieldId,
          value: input.value
        });
      });

      const url = EMPLOYEE_ID ? `/api/employees/${EMPLOYEE_ID}/` : '/api/employees/';
      const method = EMPLOYEE_ID ? 'PUT' : 'POST';

      fetch(url, {
        method: method,
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': getCookie('csrftoken'),
        },
        credentials: 'include',
        body: JSON.stringify({ form: FORM_ID, field_values })
      })
      .then(r => r.json())
      .then(data => {
        if (data.id) {
          msg.className = 'success';
          msg.textContent = 'Employee saved successfully!';
          setTimeout(() => window.location.href = "{% url 'employee_list' %}", 1000);
        } else {
          msg.className = 'error';
          msg.textContent = JSON.stringify(data);
        }
      });
    }

    function getCookie(name) {
      let cookieValue = null;
      if (document.cookie) {
        document.cookie.split(';').forEach(c => {
          c = c.trim();
          if (c.startsWith(name + '=')) cookieValue = decodeURIComponent(c.slice(name.length + 1));
        });
      }
      return cookieValue;
    }
  </script>
</body>
</html>
